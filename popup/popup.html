<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Flow Coach</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <main class="popup">
    <h1>Reading Flow Coach</h1>
    <p>선택한 영어 문장을 교정하고 메모 패널에 저장합니다.</p>
    <div class="panel">
      <button id="enterInspectMode">영역 분석 시작</button>
      <button id="toggleSidebar">우측 패널 토글</button>
      <button id="openOptions">설정 열기</button>
    </div>
    <section class="hint">
      <h2>단축키</h2>
      <ul>
        <li>Alt + Shift + B : 우측 패널 열기/닫기</li>
        <li>Alt + Shift + M : 현재 선택 저장</li>
        <li>Esc : 오버레이 닫기</li>
      </ul>
    </section>
  </main>
  <script src="./popup.js"></script>
</body>
</html>
