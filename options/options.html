<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Flow Coach Options</title>
  <link rel="stylesheet" href="./options.css" />
</head>
<body>
  <main class="options">
    <h1>Reading Flow Coach Settings</h1>
    <label><input id="autoOpenSidebar" type="checkbox" /> 저장 시 우측 패널 자동 열기</label>
    <label><input id="reduceMotion" type="checkbox" /> 모션 최소화</label>
    <button id="saveBtn">저장</button>
    <p id="status"></p>
    <section class="help">
      <h2>현재 제공 기능</h2>
      <ul>
        <li>선택한 단어와 문장 저장</li>
        <li>우측 메모 패널 검색과 타입 필터</li>
        <li>해석과 메모 직접 수정</li>
      </ul>
    </section>
  </main>
  <script src="./options.js"></script>
</body>
</html>
